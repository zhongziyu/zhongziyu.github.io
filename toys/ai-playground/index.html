<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个在线 AI 玩具页面骨架。">
  <title>AI Toy Skeleton / zhongziyu</title>
  <link rel="stylesheet" href="../toy.css">
</head>
<body>
  <main class="toy-shell">
    <nav class="toy-nav" aria-label="站点导航">
      <a href="../../">zhongziyu</a>
      <a href="../">toys</a>
      <a href="../../articles/">article</a>
    </nav>

    <header class="toy-header">
      <h1>AI Toy Skeleton</h1>
      <p>一个先在前端本地运行的 AI 玩具骨架。后面可以接入自己的 API、边缘函数或静态推理 demo。</p>

    <div class="ai-panel">
      <section>
        <label for="prompt">prompt</label>
        <textarea id="prompt">把这个想法压缩成一个适合主页展示的项目标题：数学、shader、AI 小玩具。</textarea>
        <button id="run">run toy</button>
      </section>
      <section>
        <label>output</label>
        <div class="output" id="output">等待输入。</div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
