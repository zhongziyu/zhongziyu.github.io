<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个轻量 WebGL fragment shader 实验台。">
  <title>Shader Lab / zhongziyu</title>
  <link rel="stylesheet" href="../toy.css">
</head>
<body>
  <main class="toy-shell">
    <nav class="toy-nav" aria-label="站点导航">
      <a href="../../">zhongziyu</a>
      <a href="../">Toys</a>
      <a href="../../articles/">Articles</a>
    </nav>

    <header class="toy-header">
      <h1>Shader Lab</h1>
      <p>一个最小 WebGL fragment shader 实验台。它现在只做一件事：保持干净、流畅，并给后续 shader 编辑器、预设和截图导出留下位置。</p>
    </header>

    <section class="stage" aria-label="Shader 预览">
      <canvas id="shader-canvas"></canvas>
      <div class="toolbar">
        <label>Speed <input id="speed" type="range" min="0" max="2" step="0.01" value="1"></label>
        <span id="status">Running</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
